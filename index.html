<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La prueba de Martu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #E6E6FA 0%, #D8BFD8 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #8787FF;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 30px;
            color: #8787FF;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        .menu-container {
            display: none;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-top: 30px;
        }

        .menu-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.4);
            color: #8787FF;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(155, 77, 150, 0.2);
            border: 2px solid #B19CD9;
            transition: transform 0.2s, background 0.2s;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            background: rgba(221, 160, 221, 0.5);
        }

        .menu-header {
            color: #8787FF;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .cambiar-nombre {
            margin-top: 30px;
            background: rgba(255,255,255,0.4);
            border: 1px solid #B19CD9;
            color: #8787FF;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .cambiar-nombre:hover {
            background: #B19CD9;
            color: #FFF;
        }

        /* --- Modal Customizado --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(155, 77, 150, 0.4);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            border: 2px solid #B19CD9;
            max-width: 90%;
            width: 350px;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content p {
            color: #8787FF;
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .modal-content button {
            padding: 10px 25px;
            font-size: 1rem;
            background: #B19CD9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .modal-content button:hover {
            background: #9B7DD4;
        }
    </style>
</head>
<body>
    <h1>La prueba de Martu</h1>
    
    <!-- Modal Customizado -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-text"></p>
            <button onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <!-- Pedir nombre -->
    <div id="nombre-section" style="text-align:center; margin-bottom:30px; max-width:400px; margin:0 auto 30px; display: none;">
        <p style="margin-bottom:15px; color:#8787FF; font-size: 1.2rem;">¡Bienvenid@! Ingresa tu nombre para comenzar:</p>
        <input type="text" id="nombre-jugador" placeholder="Tu nombre" style="padding:12px 20px; font-size:1.1rem; text-align:center; border-radius:6px; background:#fff0f5; color:#8787FF; border:2px solid #B19CD9; width:200px;">
        <br><br>
        <button onclick="guardarNombre()" style="padding:12px 30px; font-size:1rem; background:#B19CD9; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Comenzar</button>
    </div>
    
    <!-- Menú principal -->
    <div id="menu-section" class="menu-container">
        <h2 id="menu-saludo" class="menu-header"></h2>
        <a href="numerosromanos.html" class="menu-btn">Números Romanos</a>
        <a href="capitalesprovincias.html" class="menu-btn">Capitales de Provincias</a>
        
        <button onclick="cambiarNombre()" class="cambiar-nombre">Cambiar nombre</button>
    </div>

    <script>
        // Funciones del Modal
        function mostrarModal(mensaje) {
            document.getElementById('modal-text').textContent = mensaje;
            document.getElementById('custom-modal').classList.add('active');
        }

        function cerrarModal() {
            document.getElementById('custom-modal').classList.remove('active');
            if (document.getElementById('nombre-section').style.display !== 'none') {
                document.getElementById('nombre-jugador').focus();
            }
        }

        function inicializar() {
            const nombreGuardado = localStorage.getItem('martu_nombre');
            if (nombreGuardado) {
                document.getElementById('nombre-section').style.display = 'none';
                document.getElementById('menu-section').style.display = 'flex';
                document.getElementById('menu-saludo').textContent = `¡Hola, ${nombreGuardado}! ¿A qué jugamos?`;
            } else {
                document.getElementById('nombre-section').style.display = 'block';
                document.getElementById('menu-section').style.display = 'none';
                document.getElementById('nombre-jugador').focus();
            }
        }
        
        function guardarNombre() {
            const nombreInput = document.getElementById('nombre-jugador').value.trim();
            if (nombreInput === '') {
                mostrarModal('Por favor ingresa tu nombre');
                return;
            }
            localStorage.setItem('martu_nombre', nombreInput);
            inicializar();
        }

        function cambiarNombre() {
            localStorage.removeItem('martu_nombre');
            document.getElementById('nombre-jugador').value = '';
            inicializar();
        }

        // Permitir Enter en el campo de nombre
        document.getElementById('nombre-jugador').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                guardarNombre();
            }
        });

        // Inicializar al cargar la página
        window.onload = inicializar;
    </script>
</body>
</html>
