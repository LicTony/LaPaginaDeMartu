<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitales de Provincias - La prueba de Martu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #E6E6FA 0%, #D8BFD8 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #8787FF;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-volver {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.4);
            color: #8787FF;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            border: 2px solid #B19CD9;
            transition: background 0.2s;
        }

        .btn-volver:hover {
            background: #B19CD9;
            color: #fff;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            color: #8787FF;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            letter-spacing: 2px;
            flex-grow: 1;
        }

        .mensaje-container {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(155, 77, 150, 0.2);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .mensaje-container h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .mensaje-container p {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        /* --- Estilos del Mapa --- */
        .mapa-argentina-container {
            margin-top: 20px;
            text-align: center;
        }

        svg#map-container {
            max-width: 100%;
            height: 350px;
            margin: 0 auto;
        }

        .hidden-path {
            display: none !important;
        }

        svg#map-container path {
            transition: fill 0.3s ease;
            cursor: pointer;
        }

        svg#map-container path:hover {
            fill: #B19CD9;
        }

        /* --- Estilos Responsive (Mobile) --- */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            
            .header-container {
                flex-direction: column;
                gap: 15px;
            }

            .btn-volver {
                align-self: flex-start;
            }

            h1 {
                font-size: 2.2rem;
                margin-bottom: 20px;
            }
        }
    </style>
</head>

            { "provincia": "Tucumán", "capital": "San Miguel de Tucumán" }
        ];

        const provinceSelector = document.getElementById("provinceSelector");
        const capitalInfo = document.getElementById("capital-info");
        const capitalName = document.getElementById("capitalName");
        const mapSvg = document.getElementById("map-container");
        const allMapElements = mapSvg.querySelectorAll("path, circle");

        // Función para normalizar nombres
        function normalize(text) {
            if (!text) return "";
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        // Llenar el combo leyendo directamente los paths del mapa
        const provinces = [];
        allMapElements.forEach(el => {
            if (el.tagName === "path") {
                const name = el.getAttribute("name");
                const id = el.getAttribute("id");
                // Evitamos CABA para que la lista coincida con los datos que tenemos
                if (name && id && name !== "Ciudad de Buenos Aires") {
                    provinces.push({ id, name });
                }
            }
        });

        // Ordenar provincias alfabéticamente
        provinces.sort((a, b) => a.name.localeCompare(b.name));

        // Rellenar select
        provinceSelector.innerHTML = '<option value="">-- Seleccione una --</option>';
        provinces.forEach(prov => {
            const option = document.createElement("option");
            option.value = prov.id;
            option.textContent = prov.name;
            provinceSelector.appendChild(option);
        });

        // Función para aplicar zoom y mostrar capital
        function focusProvince(selectedId) {
            let selectedPath = null;
            let provinceName = "";

            if (!selectedId) {
                // Si no hay provincia seleccionada, mostrar el mapa entero
                mapSvg.setAttribute("viewBox", "0 0 1000 2201");
                allMapElements.forEach(el => {
                    el.classList.remove("hidden-path");
                });
                capitalInfo.style.display = "none";
                return;
            }

            allMapElements.forEach(el => {
                if (el.getAttribute("id") === selectedId) {
                    el.classList.remove("hidden-path");
                    if (el.tagName === "path") {
                        selectedPath = el;
                        provinceName = el.getAttribute("name");
                    }
                } else {
                    el.classList.add("hidden-path");
                }
            });

            if (selectedPath) {
                // ZOOM
                const bbox = selectedPath.getBBox();
                const padding = 0.15;
                const viewBoxX = bbox.x - (bbox.width * padding);
                const viewBoxY = bbox.y - (bbox.height * padding);
                const viewBoxWidth = bbox.width * (1 + padding * 2);
                const viewBoxHeight = bbox.height * (1 + padding * 2);
                mapSvg.setAttribute("viewBox", `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);

                const normalizedSelected = normalize(provinceName);
                const info = capitalData.find(d => normalize(d.provincia) === normalizedSelected);
                
                if (info) {
                    capitalName.textContent = info.capital;
                    capitalInfo.style.display = "block";
                } else {
                    capitalInfo.style.display = "none";
                }
            }
        }

        // Mostrar capital al seleccionar
        provinceSelector.addEventListener("change", function() {
            focusProvince(this.value);
        });

        // Click en el mapa
        allMapElements.forEach(el => {
            el.addEventListener("click", function() {
                const id = this.getAttribute("id");
                if (id && id !== "Ciudad de Buenos Aires") {
                    provinceSelector.value = id;
                    provinceSelector.dispatchEvent(new Event('change'));
                }
            });
        });

        // Inicializar mapa completo
        focusProvince("");
    </script>
</body>
</html>
